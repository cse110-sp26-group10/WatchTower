<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WatchTower — Dashboard Prototype</title>
  <link rel="stylesheet" href="assets/styles/styles.css" />
</head>
<body>
  <app-topbar></app-topbar>

  <div class="layout">
    <app-sidebar></app-sidebar>

    <main class="dashboard">
      <section class="filter-section" id="overview">
        <label class="filter-label" for="deployment-filter">Deployment</label>
        <select id="deployment-filter" class="filter-select" aria-label="Filter by deployment">
          <option value="all">All deployments</option>
        </select>
        <div class="deployment-detail" id="deployment-detail" hidden></div>
      </section>
    </main>
  </div>

  <app-footer></app-footer>

  <script src="assets/scripts/data.js"></script>
  <script src="assets/scripts/components.js"></script>
  <script src="assets/scripts/errors.js"></script>
</body>
