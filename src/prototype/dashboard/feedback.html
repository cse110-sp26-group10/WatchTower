<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WatchTower &mdash; User Feedback</title>
  <link rel="stylesheet" href="assets/styles/styles.css" />
</head>
<body>
  <app-topbar></app-topbar>

  <div class="layout">
    <app-sidebar></app-sidebar>

    <main class="dashboard">
      <section class="filter-section" id="overview">
        <label class="filter-label" for="deployment-filter">Deployment</label>
        <select id="deployment-filter" class="filter-select" aria-label="Filter by deployment">
          <option value="all">All deployments</option>
        </select>
        <div class="deployment-detail" id="deployment-detail" hidden></div>
      </section>

      <section class="issue-header">
        <div id="errors-banner" class="status-banner" data-level="ok">User Feedback</div>
        <div class="issue-meta-line">
          <span class="type-pill type-survey" id="errors-count">0 responses</span>
          <span class="issue-meta" id="errors-updated">Updated &mdash;</span>
        </div>
      </section>

      <section aria-labelledby="errors-title">
        <header class="panel-header">
          <h2 id="errors-title">User Feedback</h2>
          <span class="panel-hint">expand a response for context</span>
        </header>
        <div id="errors-list"></div>
      </section>
    </main>
  </div>

  <app-footer></app-footer>

  <script src="assets/scripts/data.js"></script>
  <script type="module" src="assets/scripts/components.js"></script>
  <script type="module" src="assets/scripts/signalOverview.js"></script>
</body>
</html>
